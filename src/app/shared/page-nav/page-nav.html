<ng-template #listElements>

  <li>
    <a routerLink="/start" routerLinkActive="active-link">
      <app-svg-icon type="home"></app-svg-icon>
      Startseite
    </a>
  </li>

  <li>
    <a routerLink="/datenschutz" routerLinkActive="active-link">
      <app-svg-icon type="shield"></app-svg-icon>
      Datenschutz
    </a>
  </li>

  <li>
    <a routerLink="/impressum" routerLinkActive="active-link">
      <app-svg-icon type="company"></app-svg-icon>
      Impressum
    </a>
  </li>

</ng-template>

<ul class="nav-list">
  <ng-container *ngTemplateOutlet="listElements"></ng-container>
</ul>


<div class="burger-menu">

  <button [attr.id]="'MenuButton'" popovertarget="Menu" class="burger-button">
    <app-svg-icon type="menu"></app-svg-icon>
  </button>

  <dialog [attr.id]="'Menu'" popover>
    <ul class="menu-list">
      <ng-container *ngTemplateOutlet="listElements"></ng-container>
    </ul>
  </dialog>

  <div class="page-name">{{ pageService.name$ | async }}</div>

</div>
